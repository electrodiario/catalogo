<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #C8005A; --pink-bg: #FFF0F6;
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #EAEAEA;
    --text: #1A1A1A; --muted: #6B7280;
    --shadow-hover: 0 8px 28px rgba(200,0,90,0.13);
    --radius: 16px; --tr: 0.22s cubic-bezier(.4,0,.2,1);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #980040 0%, #C8005A 50%, #FF2D87 100%);
    color: #fff; padding: 52px 32px 60px; position: relative; overflow: hidden;
  }
  .header::after {
    content: '♡'; position: absolute; right: 32px; top: 16px;
    font-size: 180px; opacity: .07; pointer-events: none; line-height: 1;
  }
  .header::before {
    content: ''; position: absolute; inset: 0; opacity: .05;
    background: repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
    background-size: 20px 20px;
  }
  .hi { max-width: 1200px; margin: 0 auto; position: relative; }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase; opacity: .7; margin-bottom: 14px; }
  .htitle { font-family: 'Cormorant', serif; font-size: clamp(42px, 7vw, 72px); font-weight: 700; line-height: .95; letter-spacing: -1.5px; margin-bottom: 10px; }
  .hsub { font-family: 'Cormorant', serif; font-size: clamp(18px, 3vw, 28px); font-style: italic; opacity: .85; margin-bottom: 28px; }
  .hbadges { display: flex; flex-wrap: wrap; gap: 8px; }
  .hbadge {
    background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
    padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 500;
  }

  /* STICKY NAV */
  .nav-wrap { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,.04); }
  .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; height: 54px; align-items: center; }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0; padding: 6px 15px; border: 1.5px solid var(--border); border-radius: 999px;
    background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; color: var(--muted); cursor: pointer; transition: all var(--tr); white-space: nowrap;
  }
  .nav-btn:hover { border-color: var(--pink); color: var(--pink); background: var(--pink-bg); }
  .nav-btn.active { background: var(--pink); border-color: var(--pink); color: #fff; box-shadow: 0 2px 12px rgba(200,0,90,.3); }

  /* SEARCH */
  .search-wrap { max-width: 1200px; margin: 28px auto 0; padding: 0 24px; }
  .sbox { position: relative; max-width: 440px; }
  .sbox input {
    width: 100%; padding: 12px 16px 12px 42px; border: 1.5px solid var(--border);
    border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--surface); color: var(--text); outline: none;
    transition: border-color var(--tr);
  }
  .sbox input:focus { border-color: var(--pink); }
  .sbox input::placeholder { color: #C0C8D0; }
  .sicon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #C0C8D0; pointer-events: none; }
  .rcount { font-size: 12px; color: var(--muted); margin-top: 6px; margin-left: 2px; min-height: 16px; }

  /* MAIN */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 24px 72px; }

  /* SECTION */
  .section { margin-bottom: 52px; }
  .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border); }
  .sec-icon { font-size: 22px; line-height: 1; }
  .sec-title { font-family: 'Cormorant', serif; font-size: 30px; font-weight: 700; letter-spacing: -.5px; }
  .sec-count { font-size: 11px; color: var(--muted); background: #EFEFEF; padding: 2px 8px; border-radius: 999px; font-weight: 600; margin-left: auto; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }

  /* CARD */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: transform var(--tr), box-shadow var(--tr), border-color var(--tr);
    display: flex; flex-direction: column; cursor: default;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: rgba(200,0,90,.18); }

  /* CARD IMAGE AREA */
  .cimg-wrap {
    position: relative; width: 100%; padding-top: 72%; /* 4:3 */
    overflow: hidden; background: #F3F3F3;
  }
  .cimg-wrap img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; padding: 12px;
    transition: transform .35s ease;
  }
  .card:hover .cimg-wrap img { transform: scale(1.04); }

  /* CARD BODY */
  .cbody { padding: 14px 14px 16px; flex: 1; display: flex; flex-direction: column; }
  .ctop { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .cbrand { font-size: 9.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; color: #fff; }
  .cname { font-size: 14.5px; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 7px; flex: 1; }
  .cspecs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; padding-top: 10px; border-top: 1px solid #F3F3F3; }
  .stag { font-size: 10.5px; color: var(--muted); background: #F5F5F5; padding: 2px 7px; border-radius: 6px; font-weight: 500; }

  /* NO RESULTS */
  .noresult { text-align: center; padding: 80px 20px; color: var(--muted); }
  .noresult .ni { font-size: 48px; margin-bottom: 16px; }
  .noresult h3 { font-family: 'Cormorant', serif; font-size: 26px; font-weight: 600; }

  /* FOOTER */
  footer { text-align: center; padding: 28px; font-size: 11.5px; color: var(--muted); border-top: 1px solid var(--border); line-height: 2; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .card { animation: fadeUp .45s ease both; }

  @media(max-width:600px){
    .header { padding: 32px 20px 40px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .cname { font-size: 13px; }
    .main { padding: 16px 14px 56px; }
  }
</style>

  {cat:'deportes',brand:'Remera',name:'Olimpia 2026',specs:['Oficial 2026','S/M/L/XL']},
];

// ─── LOCAL IMAGE HELPERS ────────────────────
const slugify = (txt) =>
  txt
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');

const getLocalProductImage = (p) =>
  `images/${p.cat}-${slugify(`${p.brand}-${p.name}`)}.jpg`;

const getCategoryFallbackImage = (cat) => `images/cat-${cat}.jpg`;

// ─── STATE ──────────────────────────────────
let activeCat = 'all';
let search = '';

// ─── RENDER ─────────────────────────────────
function render() {
  const main = document.getElementById('mainContent');
  const q = search.toLowerCase().trim();

  const filtered = P.filter(p => {
    const mc = activeCat === 'all' || p.cat === activeCat;
    const ms = !q || [p.brand, p.name, ...p.specs].join(' ').toLowerCase().includes(q);
    return mc && ms;
  });

  document.getElementById('rcount').textContent =
    q || activeCat !== 'all'
      ? `${filtered.length} producto${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}`
      : '';

  if (!filtered.length) {
    main.innerHTML = `<div class="noresult"><div class="ni">🔍</div><h3>Sin resultados</h3><p style="margin-top:8px;font-size:14px">Intentá otra búsqueda o categoría</p></div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(p => { (grouped[p.cat] = grouped[p.cat] || []).push(p); });

  const catOrder = Object.keys(CM);
  main.innerHTML = catOrder
    .filter(c => grouped[c])
    .map((c, si) => {
      const meta = CM[c];
      const items = grouped[c];
      const cards = items.map((p, i) => {
        const bc = gc(p.brand);
        return `
          <div class="card" style="animation-delay:${(i*0.03).toFixed(2)}s">
            <div class="cimg-wrap" style="background:linear-gradient(135deg,${bc}14,${bc}08);">
              <img
                src="${getLocalProductImage(p)}"
                alt="${p.brand} ${p.name}"
                loading="lazy"
                onerror="this.onerror=null;this.src='${getCategoryFallbackImage(c)}';"
              >
            </div>
            <div class="cbody">
              <div class="ctop">
                <span class="cbrand" style="background:${bc}">${p.brand}</span>
              </div>
              <p class="cname">${p.name}</p>
              <div class="cspecs">${p.specs.map(s=>`<span class="stag">${s}</span>`).join('')}</div>
            </div>
          </div>`;
      }).join('');

      return `
        <section class="section" style="animation-delay:${(si*0.05).toFixed(2)}s">
          <div class="sec-head">
            <span class="sec-icon">${meta.icon}</span>
            <h2 class="sec-title">${meta.label}</h2>
            <span class="sec-count">${items.length} productos</span>
          </div>
          <div class="grid">${cards}</div>
        </section>`;
    }).join('');

}

// ─── EVENTS ─────────────────────────────────
document.getElementById('catNav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
});

let stimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(stimer);
  stimer = setTimeout(() => { search = e.target.value; render(); }, 200);
});

render();
</script>
</body>
</html>
